<!DOCTYPE html>
<html lang="es" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>¡Español Ya! — Curso Interactivo de Español</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app" class="notranslate" translate="no">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div style="font-weight:700;color:#AA151B">¡Español Ya!</div>
  </div>
</div>

<!-- Firebase SDK (compat, sem build step) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- Configuração (edite firebase-config.js com suas próprias chaves) -->
<script src="firebase-config.js"></script>

<!-- Conteúdo do curso -->
<script src="content-fundamentos.js"></script>
<script src="content-basico.js"></script>
<script src="content-intermedio.js"></script>
<script src="content-avanzado.js"></script>
<script src="content-secretos.js"></script>
<script src="content-profesional.js"></script>
<script src="content-normas.js"></script>

<!-- jsPDF (geração dos certificados em PDF, sem build step) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- Chart.js (gráficos dos dashboards de analytics, sem build step).
     BUGFIX (2026-07-13): "chart.min.js" en cdnjs para la v4.x es el build ESM (usa "import"
     internamente) — cargarlo con un <script> normal (no type="module") tira
     "Uncaught SyntaxError: Cannot use import statement outside a module" y Chart.js NUNCA
     se define en window. Como renderChart() en app.js ya chequea "typeof Chart === undefined"
     y sale en silencio si no está, todos los gráficos (Analíticas admin Y "Mis Notas" del
     alumno) quedaban con el canvas vacío, sin ningún error visible para quien no abre la
     consola — confirmado en vivo con Claude-in-Chrome en producción. El build correcto para
     <script> clásico es "chart.umd.min.js" (UMD, define window.Chart). -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>

<!-- Motor do app -->
<script src="app.js"></script>
</body>
</html>
